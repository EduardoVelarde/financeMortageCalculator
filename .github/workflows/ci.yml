name: release-ready
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  notify-release-ready:
    runs-on: ubuntu-latest
    steps:
      - name: Let ReleaseReady orchestrate execution
        env:
          RELEASEREADY_WEBHOOK_URL: ${{ vars.RELEASEREADY_WEBHOOK_URL }}
          RELEASEREADY_WEBHOOK_SECRET: ${{ secrets.RELEASEREADY_WEBHOOK_SECRET }}
        run: |
          RELEASEREADY_WEBHOOK_URL="$(printf '%s' "$RELEASEREADY_WEBHOOK_URL" | tr -d '')"
          RELEASEREADY_WEBHOOK_SECRET="$(printf '%s' "$RELEASEREADY_WEBHOOK_SECRET" | tr -d '')"
          RELEASEREADY_SIGNATURE="sha256=$(openssl dgst -sha256 -hmac "$RELEASEREADY_WEBHOOK_SECRET" "$GITHUB_EVENT_PATH" | sed 's/^.* //')"
          curl -X POST "$RELEASEREADY_WEBHOOK_URL"             -H "X-Hub-Signature-256: $RELEASEREADY_SIGNATURE"             -H "X-GitHub-Event: pull_request"             -H "Content-Type: application/json"             --data-binary "@$GITHUB_EVENT_PATH"
