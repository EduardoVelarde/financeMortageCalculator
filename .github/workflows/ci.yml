name: release-ready
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  notify-release-ready:
    runs-on: ubuntu-latest
    steps:
      - name: Let ReleaseReady orchestrate execution
        run: |
          curl -X POST "https://app.releaseready.dev/api/webhooks/github?projectId=cmmn4tloz0001l404xheadfr0"             -H "X-Hub-Signature-256:74f2ced00704de131c2fab96c87b4957a5ca8b34a8d60fc95fe3e13eb322e5ee"             -H "Content-Type: application/json"             --data @github-event.json

# ReleaseReady handles:
# - project mapping
# - trigger orchestration
# - delegated runner execution or direct execution
# - result ingestion
# - checklist run visibility
